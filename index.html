<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetCam Link - スマホをペットカメラに</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              900: '#115e59',
            },
            darkbg: {
              DEFAULT: '#0f172a',
              card: '#1e293b',
              input: '#334155'
            }
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .animate-pulse-red {
      animation: pulse-red 1.5s infinite;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="bg-darkbg text-slate-100 min-h-screen flex flex-col font-sans selection:bg-brand-500 selection:text-white">

  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50 px-4 py-3">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-gradient-to-tr from-brand-500 to-emerald-400 p-2 rounded-xl text-darkbg shadow-lg shadow-brand-500/20">
          <i data-lucide="camera" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-emerald-300">
            PetCam Link
          </h1>
          <p class="text-xs text-slate-400">お留守番のペットを見守り</p>
        </div>
      </div>
      <div class="flex items-center space-x-2">
        <!-- 初期状態を「準備中」から「待機中」に変更 -->
        <span id="connection-status-badge" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-slate-800 text-slate-400 flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-slate-500"></span> IDを入力してください
        </span>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto p-4 flex flex-col justify-start">
    <!-- 通知トースト -->
    <div id="toast" class="hidden fixed bottom-6 right-6 z-50 max-w-sm bg-slate-800 border-l-4 border-brand-500 p-4 rounded shadow-2xl transition-all duration-300 flex items-start gap-3">
      <div class="text-brand-400"><i data-lucide="info" class="w-5 h-5"></i></div>
      <div class="flex-1"><p id="toast-message" class="text-sm font-medium whitespace-pre-line"></p></div>
      <button onclick="window.hideToast()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>

    <!-- 1. セットアップ画面 -->
    <section id="screen-setup" class="my-auto py-8">
      <div class="max-w-xl mx-auto text-center space-y-8">
        <div class="space-y-3">
          <h2 class="text-3xl font-extrabold text-white">デバイスの役割を選択</h2>
          <p class="text-slate-400 max-w-md mx-auto">1台を「カメラ（送信）」に、もう1台を「モニター（受信）」にします。</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
          <button id="btn-select-camera" class="group flex flex-col items-center p-6 bg-slate-800/60 border-2 border-slate-700 rounded-2xl hover:border-brand-500/80 transition-all shadow-xl">
            <div class="bg-brand-500/10 text-brand-400 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform"><i data-lucide="aperture" class="w-10 h-10"></i></div>
            <h3 class="text-lg font-bold text-white mb-2">① カメラとして使う</h3>
          </button>
          <button id="btn-select-monitor" class="group flex flex-col items-center p-6 bg-slate-800/60 border-2 border-slate-700 rounded-2xl hover:border-emerald-500/80 transition-all shadow-xl">
            <div class="bg-emerald-500/10 text-emerald-400 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform"><i data-lucide="tv" class="w-10 h-10"></i></div>
            <h3 class="text-lg font-bold text-white mb-2">② モニターとして使う</h3>
          </button>
        </div>
        <div class="bg-slate-800/40 border border-slate-700/60 rounded-2xl p-6 max-w-md mx-auto text-left space-y-4">
          <label class="block text-sm font-semibold text-slate-300">ルーム接続コード</label>
          <div class="flex gap-2">
            <input type="text" id="input-room-id" placeholder="例: room-123" class="flex-1 bg-darkbg-input border border-slate-600 rounded-xl px-4 py-2.5 text-white font-mono focus:border-brand-500 outline-none">
            <button id="btn-generate-room" class="bg-slate-700 hover:bg-slate-600 px-4 py-2.5 rounded-xl text-sm font-medium transition-colors flex items-center gap-1.5"><i data-lucide="shuffle" class="w-4 h-4"></i> 生成</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 2. カメラ画面 -->
    <section id="screen-camera" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6 py-4">
      <div class="lg:col-span-2 space-y-4">
        <div class="relative bg-black rounded-2xl overflow-hidden aspect-video shadow-2xl border border-slate-800">
          <video id="camera-preview" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover"></video>
          <canvas id="camera-zoom-canvas" class="hidden"></canvas>
          <div class="absolute top-4 left-4 flex gap-2">
            <span class="px-3 py-1 text-xs font-bold rounded-full bg-red-600 text-white flex items-center gap-1.5 shadow-md">
              <span class="w-2.5 h-2.5 rounded-full bg-white animate-pulse-red"></span> CAMERA LIVE
            </span>
          </div>
          <div class="absolute bottom-4 left-4 bg-slate-900/80 backdrop-blur px-3 py-1.5 rounded-xl text-xs space-y-1 border border-slate-700">
            <div class="flex items-center gap-2"><span class="text-slate-400">送出倍率:</span><span id="indicator-zoom" class="font-bold text-brand-400">1.0x</span></div>
            <div class="flex items-center gap-2"><span class="text-slate-400">映像状態:</span><span id="camera-track-status" class="font-bold text-emerald-400">待機中</span></div>
          </div>
        </div>
        <div class="bg-darkbg-card rounded-2xl p-6 border border-slate-800 flex justify-between items-center">
            <div><p class="text-xs text-slate-400">接続コード</p><h4 id="display-camera-room-id" class="text-2xl font-mono font-bold text-brand-400 tracking-wider">---</h4></div>
            <button id="btn-stop-camera" class="bg-rose-600/20 hover:bg-rose-600 text-rose-200 px-5 py-2.5 rounded-xl font-semibold transition-all flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> 配信終了</button>
        </div>
      </div>
      <div class="bg-darkbg-card rounded-2xl p-6 border border-slate-800 space-y-4">
        <h3 class="text-lg font-bold text-white flex items-center gap-2"><i data-lucide="database" class="text-amber-400 w-5 h-5"></i> 自律ループ録画</h3>
        <div class="space-y-1.5">
          <div class="flex justify-between text-xs"><span class="text-slate-400">使用状況:</span><span id="storage-usage-text" class="font-semibold text-slate-200">0 MB / 100 MB</span></div>
          <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden"><div id="storage-usage-bar" class="bg-amber-500 h-full w-0"></div></div>
        </div>
        <div id="recordings-list" class="space-y-3 max-h-64 overflow-y-auto pr-1 text-xs text-slate-500">録画データ待機中...</div>
      </div>
    </section>

    <!-- 3. モニター画面 -->
    <section id="screen-monitor" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6 py-4">
      <div class="lg:col-span-2 space-y-4">
        <div class="relative bg-black rounded-2xl overflow-hidden aspect-video shadow-2xl border border-slate-800 group">
          <video id="monitor-video" autoplay playsinline class="w-full h-full object-cover bg-slate-950"></video>
          
          <!-- タップして再生の案内 -->
          <div id="video-play-prompt" class="hidden absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center cursor-pointer">
            <div class="bg-brand-500 text-darkbg p-4 rounded-full shadow-2xl animate-bounce mb-3"><i data-lucide="play" class="w-8 h-8 fill-current"></i></div>
            <p class="text-white font-bold text-sm">タップして映像と音声を再生</p>
          </div>

          <div class="absolute top-4 left-4 flex gap-2">
            <span id="monitor-live-badge" class="px-3 py-1 text-xs font-bold rounded-full bg-emerald-600 text-white shadow-md">LIVE</span>
            <span id="monitor-zoom-badge" class="px-3 py-1 text-xs font-bold rounded-full bg-slate-900/80 backdrop-blur text-brand-400 border border-slate-700 shadow-md">ZOOM: 1.0x</span>
          </div>
        </div>
        <div class="bg-darkbg-card rounded-2xl p-6 border border-slate-800 space-y-4">
          <div class="flex justify-between items-center"><span class="text-sm font-semibold">遠隔ズーム</span><span id="zoom-value" class="text-sm font-bold text-brand-400">1.0 x</span></div>
          <input type="range" id="slider-zoom" min="1" max="4" step="0.1" value="1" class="w-full accent-brand-500">
        </div>
      </div>
      <div class="space-y-4">
          <div class="bg-darkbg-card rounded-2xl p-6 border border-slate-800 space-y-4">
            <h3 class="text-md font-bold text-white flex items-center gap-2"><i data-lucide="video" class="text-amber-400 w-5 h-5"></i> 遠隔録画</h3>
            <button id="btn-remote-rec-toggle" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2 transition-colors"><i data-lucide="circle" class="w-4 h-4 fill-white"></i> 録画スタート</button>
          </div>
          <button id="btn-stop-monitor" class="w-full bg-slate-700 py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2"><i data-lucide="x-circle" class="w-4 h-4"></i> 監視終了</button>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- 設定とグローバル変数 ---
    const appId = 'petcam-link-app';
    const firebaseConfig = {
      apiKey: "AIzaSyCk2JY_lKdk6653fhGPuoSC_zLbpXNYvSI",
      authDomain: "petcamera-f44aa.firebaseapp.com",
      projectId: "petcamera-f44aa",
      storageBucket: "petcamera-f44aa.firebasestorage.app",
      messagingSenderId: "563268558823",
      appId: "1:563268558823:web:b3cfde8c8b729716de6742"
    };

    let app, auth, db, user, firebaseInitialized = false;
    let localStream = null, canvasStream = null, peerConnection = null, zoomLevel = 1.0, activeRoomId = '', currentRole = null;
    let appliedCandidatesIndex = 0;
    const rtcConfig = { iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }] };

    // --- UIヘルパー ---
    window.showToast = (msg) => {
      const t = document.getElementById('toast');
      document.getElementById('toast-message').innerText = msg;
      t.classList.remove('hidden');
      setTimeout(() => window.hideToast(), 5000);
    };
    window.hideToast = () => document.getElementById('toast').classList.add('hidden');
    
    function updateBadge(state, text) {
      const b = document.getElementById('connection-status-badge');
      if (!b) return;
      b.innerText = text;
      b.className = `px-2.5 py-1 text-xs font-semibold rounded-full flex items-center gap-1.5 ${state === 'active' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-400'}`;
    }

    // --- 描画ループ (ズーム処理用) ---
    const startZoomLoop = (video, canvas) => {
      const ctx = canvas.getContext('2d', { alpha: false });
      const draw = () => {
        if (currentRole !== 'camera') return;
        if (video.videoWidth > 0) {
          if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
          }
          const w = canvas.width, h = canvas.height;
          const sw = w / zoomLevel, sh = h / zoomLevel;
          const sx = (w - sw) / 2, sy = (h - sh) / 2;
          ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
          document.getElementById('camera-track-status').innerText = "映像送出中";
        }
        requestAnimationFrame(draw);
      };
      draw();
    };

    // --- WebRTC セットアップ ---
    const setupPeer = async (roomId, isCaller) => {
      if (peerConnection) peerConnection.close();
      peerConnection = new RTCPeerConnection(rtcConfig);
      appliedCandidatesIndex = 0;

      // 候補の送信
      peerConnection.onicecandidate = async e => {
        if (e.candidate && db) {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
          const snap = await getDoc(roomRef);
          const key = isCaller ? 'monitorCandidates' : 'cameraCandidates';
          const candidates = snap.data()[key] || [];
          candidates.push(e.candidate.toJSON());
          await updateDoc(roomRef, { [key]: candidates });
        }
      };

      // トラック受信 (Monitor側)
      peerConnection.ontrack = e => {
        const v = document.getElementById('monitor-video');
        if (v && e.streams[0]) {
          v.srcObject = e.streams[0];
          // 自動再生を試みる
          v.play().then(() => {
            document.getElementById('video-play-prompt').classList.add('hidden');
            updateBadge('active', '見守り中 (LIVE)');
          }).catch(() => {
            // ブロックされた場合はボタンを表示
            document.getElementById('video-play-prompt').classList.remove('hidden');
          });
        }
      };

      // 送信トラック追加 (Camera側 / Monitor側マイク)
      const stream = isCaller ? localStream : (canvasStream || localStream);
      if (stream) stream.getTracks().forEach(tr => peerConnection.addTrack(tr, stream));
    };

    // --- モード開始: カメラ ---
    const startCamera = async (roomId) => {
      currentRole = 'camera'; activeRoomId = roomId;
      document.getElementById('screen-setup').classList.add('hidden');
      document.getElementById('screen-camera').classList.remove('hidden');
      document.getElementById('display-camera-room-id').innerText = roomId;
      updateBadge('pending', 'カメラ準備中...');

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
        const v = document.getElementById('camera-preview');
        v.srcObject = localStream;
        const c = document.getElementById('camera-zoom-canvas');
        startZoomLoop(v, c);
        canvasStream = c.captureStream(30);

        if (firebaseInitialized) {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
          await setDoc(roomRef, { createdAt: Date.now(), controls: { zoom: 1.0, isRecording: false }, monitorCandidates: [], cameraCandidates: [] });
          
          onSnapshot(roomRef, async snap => {
            const data = snap.data();
            if (!data) return;
            // オファーが届いたらアンサーを返す
            if (data.offer && !peerConnection) {
              await setupPeer(roomId, false);
              await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
              const ans = await peerConnection.createAnswer();
              await peerConnection.setLocalDescription(ans);
              await updateDoc(roomRef, { answer: { type: ans.type, sdp: ans.sdp } });
              updateBadge('active', 'モニター接続中');
            }
            // 候補の反映
            if (data.monitorCandidates && peerConnection) {
              while (appliedCandidatesIndex < data.monitorCandidates.length) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.monitorCandidates[appliedCandidatesIndex++]));
              }
            }
            if (data.controls) zoomLevel = data.controls.zoom;
            document.getElementById('indicator-zoom').innerText = zoomLevel.toFixed(1) + 'x';
          });
        }
      } catch (err) { window.showToast("カメラ起動エラー: " + err.message); }
    };

    // --- モード開始: モニター ---
    const startMonitor = async (roomId) => {
      currentRole = 'monitor'; activeRoomId = roomId;
      document.getElementById('screen-setup').classList.add('hidden');
      document.getElementById('screen-monitor').classList.remove('hidden');
      updateBadge('pending', '接続を試行中...');

      if (firebaseInitialized) {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
        const snap = await getDoc(roomRef);
        if (!snap.exists()) {
           window.showToast("カメラが見つかりません。先にカメラ側を開始してください。");
           return;
        }

        await setupPeer(roomId, true);
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        await updateDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp } });

        onSnapshot(roomRef, async snap => {
          const data = snap.data();
          if (!data) return;
          if (data.answer && peerConnection && !peerConnection.currentRemoteDescription) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
          }
          if (data.cameraCandidates && peerConnection) {
            while (appliedCandidatesIndex < data.cameraCandidates.length) {
              await peerConnection.addIceCandidate(new RTCIceCandidate(data.cameraCandidates[appliedCandidatesIndex++]));
            }
          }
        });
      }
    };

    // --- 初期化実行 ---
    const initApp = async () => {
      // 1. Firebase初期化を非同期で開始（失敗しても次に進む）
      try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        const cred = await signInAnonymously(auth);
        user = cred.user;
        firebaseInitialized = true;
        console.log("Firebase OK");
      } catch (e) {
        console.error("Firebase Error:", e);
        window.showToast("クラウド接続に制限があります。同じブラウザ内でのテストのみ可能です。");
      }

      // 2. ボタンイベント登録
      document.getElementById('btn-select-camera').onclick = () => {
        const rid = document.getElementById('input-room-id').value;
        if (rid) startCamera(rid); else window.showToast("コードを入力してください");
      };
      document.getElementById('btn-select-monitor').onclick = () => {
        const rid = document.getElementById('input-room-id').value;
        if (rid) startMonitor(rid); else window.showToast("コードを入力してください");
      };
      document.getElementById('btn-generate-room').onclick = () => {
        document.getElementById('input-room-id').value = 'room-' + Math.random().toString(36).substr(2, 5);
      };
      document.getElementById('slider-zoom').oninput = async e => {
        const v = parseFloat(e.target.value);
        document.getElementById('zoom-value').innerText = v.toFixed(1) + ' x';
        if (firebaseInitialized && activeRoomId) {
           await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', activeRoomId), { 'controls.zoom': v });
        }
      };
      document.getElementById('video-play-prompt').onclick = () => {
        const v = document.getElementById('monitor-video');
        v.play();
        document.getElementById('video-play-prompt').classList.add('hidden');
      };

      lucide.createIcons();
    };

    // 起動
    initApp();
  </script>
</body>
</html>
